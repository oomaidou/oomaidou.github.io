<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>美团酒店/民宿优惠券 - 华住每日最高领650元 | 神券券券</title>

    <meta name="keywords" content="美团酒店优惠券,华住酒店券,美团民宿优惠,订酒店省钱">
    <link rel="canonical" href="https://www.shenquanquan.com/coupons/meituan-hotel/">
    <style>
        * { box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; margin: 0; background: #f4f5f7; color: #333; }
        .page-header { background: linear-gradient(90deg,#1565c0,#42a5f5); padding: 20px 16px 24px; text-align: center; border-radius: 0 0 16px 16px; }
        .page-header h1 { color: #fff; font-size: 1.5rem; margin: 0 0 6px; }
        .page-header p { color: rgba(255,255,255,.9); margin: 0; font-size: .95rem; }
        .back { display: inline-block; margin: 12px 16px; color: #666; text-decoration: none; font-size: .9rem; }
        .back::before { content: '← '; }
        .coupon-list { padding: 12px 16px; }
        .section-title { font-size: .9rem; color: #aaa; margin: 16px 0 8px; padding-left: 4px; }
        .coupon-card { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 12px; display: flex; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,.07); }
        .coupon-icon { width: 48px; height: 48px; border-radius: 10px; margin-right: 14px; flex-shrink: 0; object-fit: contain; background: #f5f5f5; }
        .coupon-info { flex: 1; min-width: 0; }
        .coupon-title { font-size: 1rem; font-weight: 600; color: #222; margin-bottom: 4px; }
        .coupon-desc { font-size: .85rem; color: #888; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 20px; font-size: .88rem; font-weight: 600; text-decoration: none; white-space: nowrap; cursor: pointer; border: none; }
        .btn-link { background: linear-gradient(135deg,#FF8C00,#FFA500); color: #fff; }
        .btn-copy { background: linear-gradient(135deg,#e53935,#ef9a9a); color: #fff; }
        .copy-tip { display: none; color: #e53935; font-size: .78rem; margin-top: 4px; }
        .bottom-link { text-align: center; padding: 20px 0 30px; }
        .bottom-link a { color: #FF8C00; font-size: .9rem; }
    </style>
</head>
<body>
<div class="page-header">
    <h1>🏨 美团酒店/民宿优惠券</h1>
    <p>华住每日最高领650元 · 民宿200元无门槛</p>
</div>
<a class="back" href="/coupons/">返回优惠券总览</a>

<div class="coupon-list">
    <div class="section-title">酒店 & 民宿优惠</div>
    <div id="coupons-hotel"></div>
</div>

<div class="bottom-link">
    <a href="/posts/hua-zhu-jiudian-meituan-minshu-youhuiquan-lingqu/">查看酒店省钱攻略 →</a>
</div>

<script>
// 从主 JSON 加载指定 ID 的优惠券
var HOTEL_IDS = ['meituan-13', 'meituan-14', 'meituan-15'];

function renderCoupon(c) {
    var icon = c.icon ? '../' + c.icon : '../meituan/meituan.png';
    var btn = '';
    if (c.type === 'copy') {
        var tipId = 'tip-' + c.id;
        btn = '<button class="btn btn-copy" onclick="copyText(\'' + escHtml(c.content) + '\',\'' + tipId + '\')">一键复制</button>'
            + '<div class="copy-tip" id="' + tipId + '">已复制，请在微信中粘贴打开</div>';
    } else {
        btn = '<a class="btn btn-link" href="' + escHtml(c.url || '#') + '" target="_blank" rel="noopener">' + escHtml(c.action || '立即领取') + '</a>';
    }
    return '<div class="coupon-card">'
        + '<img class="coupon-icon" src="' + icon + '" alt="' + escHtml(c.title) + '">'
        + '<div class="coupon-info"><div class="coupon-title">' + escHtml(c.title) + '</div>'
        + '<div class="coupon-desc">' + escHtml(c.description || '') + '</div></div>'
        + btn + '</div>';
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function copyText(text, tipId) {
    if (navigator.clipboard) {
        navigator.clipboard.writeText(text).catch(function() { fallbackCopy(text); });
    } else { fallbackCopy(text); }
    var tip = document.getElementById(tipId);
    if (tip) tip.style.display = 'block';
}
function fallbackCopy(text) {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta); ta.select();
    try { document.execCommand('copy'); } catch(e) {}
    document.body.removeChild(ta);
}

fetch('../meituan/coupons.json').then(function(r){ return r.json(); }).then(function(data) {
    var map = {};
    (data.sections || []).forEach(function(s) {
        (s.coupons || []).forEach(function(c) { map[c.id] = c; });
    });
    document.getElementById('coupons-hotel').innerHTML = HOTEL_IDS.map(function(id){ return map[id] ? renderCoupon(map[id]) : ''; }).join('');
}).catch(function(e){ console.warn('加载优惠券失败', e); });
</script>
</body>
</html>
